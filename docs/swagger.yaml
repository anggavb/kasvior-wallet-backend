basePath: /
definitions:
  dto.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.ResetPasswordRequest:
    properties:
      new_password:
        minLength: 8
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  dto.Response:
    properties:
      data: {}
      error:
        type: string
      errors: {}
      is_success:
        type: boolean
      message:
        type: string
    type: object
  dto.TopupRequest:
    properties:
      amount:
        type: integer
      discount:
        minimum: 0
        type: integer
      payment_method_id:
        type: integer
      sub_total:
        minimum: 0
        type: integer
      tax:
        minimum: 0
        type: integer
      type:
        enum:
        - topup
        - transfer
        - receiver
        type: string
    required:
    - amount
    - discount
    - payment_method_id
    - sub_total
    - tax
    - type
    type: object
  dto.UserCheckPinRequest:
    properties:
      pin:
        type: string
    required:
    - pin
    type: object
  dto.UserUpdatePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  dto.UserUpdatePinRequest:
    properties:
      pin:
        type: string
    required:
    - pin
    type: object
host: localhost:8080
info:
  contact: {}
  description: API documentation for Kasvior Wallet backend application
  license:
    name: MIT
  title: Backend Kasvior Wallet API
  version: "1.0"
paths:
  /auth:
    post:
      consumes:
      - application/json
      description: Authenticate a user and return an access token.
      parameters:
      - description: Login request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login Successfully
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Invalid email or password
          schema:
            $ref: '#/definitions/dto.Response'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      summary: Login user
      tags:
      - Auth
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Send password reset instructions when the email is registered.
      parameters:
      - description: Forgot password request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: If the email is registered, reset instructions have been sent
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.Response'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      summary: Request password reset
      tags:
      - Auth
  /auth/logout:
    delete:
      consumes:
      - application/json
      description: Invalidate the current bearer token.
      produces:
      - application/json
      responses:
        "200":
          description: Logout Successfully
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - ApiKeyAuth: []
      summary: Logout user
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account with email and password.
      parameters:
      - description: Register request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Register Successfully
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.Response'
        "409":
          description: Email Already Used
          schema:
            $ref: '#/definitions/dto.Response'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      summary: Register new user
      tags:
      - Auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Reset a user password using a valid password reset token.
      parameters:
      - description: Reset password request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Reset Password Successfully
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Invalid or expired reset token
          schema:
            $ref: '#/definitions/dto.Response'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      summary: Reset password
      tags:
      - Auth
  /transaction/topup:
    post:
      consumes:
      - application/json
      description: Create a topup transaction for the authenticated user.
      parameters:
      - description: Topup request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.TopupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Topup Successfully!
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - ApiKeyAuth: []
      summary: Create topup transaction
      tags:
      - Transactions
  /transaction/transfer/receivers:
    get:
      description: Get receiver suggestions for the authenticated user.
      parameters:
      - description: Receiver name or phone number search keyword
        in: query
        maxLength: 100
        name: search
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Get Receivers Successfully
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - ApiKeyAuth: []
      summary: Find transfer receivers
      tags:
      - Transactions
  /users/me/:
    get:
      description: Get profile information for the authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: Get Profile Successfully
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - ApiKeyAuth: []
      summary: Get current user profile
      tags:
      - Users
    patch:
      consumes:
      - multipart/form-data
      description: Update at least one profile field for the authenticated user. Profile
        fields are limited to 255 characters.
      parameters:
      - description: Full name of the user
        in: formData
        maxLength: 255
        name: fullname
        type: string
      - description: Phone number of the user
        in: formData
        maxLength: 255
        name: phone_number
        type: string
      - description: Profile photo of the user
        in: formData
        name: photo
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Update Profile Successfully
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - ApiKeyAuth: []
      summary: Update current user profile
      tags:
      - Users
  /users/me/password:
    patch:
      consumes:
      - application/json
      description: Update the authenticated user's password.
      parameters:
      - description: Update password request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UserUpdatePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Update Password Successfully
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Invalid current password or unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - ApiKeyAuth: []
      summary: Update current user password
      tags:
      - Users
  /users/me/pin:
    patch:
      consumes:
      - application/json
      description: Update the authenticated user's 6-digit numeric PIN.
      parameters:
      - description: Update PIN request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UserUpdatePinRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Update PIN Successfully
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - ApiKeyAuth: []
      summary: Update current user PIN
      tags:
      - Users
  /users/me/pin/check:
    get:
      consumes:
      - application/json
      description: Validate the authenticated user's 6-digit numeric PIN.
      parameters:
      - description: Check PIN request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UserCheckPinRequest'
      produces:
      - application/json
      responses:
        "200":
          description: PIN Valid
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Invalid PIN, PIN not set, or unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - ApiKeyAuth: []
      summary: Check current user PIN
      tags:
      - Users
  /users/me/transaction-report:
    get:
      description: Get the authenticated user's transaction report for the last 7
        days.
      parameters:
      - default: 7d
        description: Report duration
        enum:
        - 7d
        in: query
        name: duration
        type: string
      - default: all
        description: Report type
        enum:
        - all
        - income
        - expense
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Get Transaction Report Successfully
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - ApiKeyAuth: []
      summary: Get current user transaction report
      tags:
      - Users
  /users/me/wallet:
    get:
      description: Get balance, income, and expense information for the authenticated
        user.
      produces:
      - application/json
      responses:
        "200":
          description: Get Dashboard Information Successfully
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - ApiKeyAuth: []
      summary: Get current user wallet dashboard
      tags:
      - Users
securityDefinitions:
  ApiKeyAuth:
    description: 'Bearer token used for authorization. Example: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
